<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomsday Ultra Bot | Setup Guide</title>
    <style>
        :root { --main: #ff4500; --bg: #0b0b0b; --card: #151515; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; line-height: 1.6; }
        .container { max-width: 900px; margin: 40px auto; padding: 20px; }
        .hero { background: #1a1a1a; padding: 50px 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        h1 { color: var(--main); font-size: 2.8rem; margin: 0; }
        .download-btn { background: var(--main); color: white; padding: 18px 50px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 1.3rem; display: inline-block; margin: 20px 0; box-shadow: 0 0 20px rgba(255, 69, 0, 0.4); transition: 0.3s; }
        .download-btn:hover { transform: scale(1.05); background: #ff5714; }
        
        /* How to Use Section */
        .setup-guide { background: var(--card); padding: 30px; border-radius: 12px; text-align: left; margin-top: 40px; border: 1px dashed #444; }
        .setup-guide h2 { color: var(--main); border-bottom: 2px solid #333; padding-bottom: 10px; }
        .step { margin-bottom: 20px; display: flex; align-items: flex-start; }
        .step-num { background: var(--main); color: white; min-width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; margin-top: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 30px; }
        .feature { background: #222; padding: 20px; border-radius: 8px; border-left: 4px solid var(--main); text-align: left; }
    </style>
</head>
