<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomsday Farm Bot | Official Store</title>
    <style>
        :root { --main: #ff4500; --bg: #0b0b0b; --card: #1a1a1a; --accent: #ffd700; --discord: #5865F2; --tele: #0088cc; --mumu: #3498db; }
        body { background: var(--bg); color: #eee; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .container { max-width: 850px; margin: 40px auto; padding: 20px; }
        .hero { background: #1a1a1a; padding: 40px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--main); margin: 0; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Mumu Exclusive Badge */
        .mumu-badge { background: rgba(52, 152, 219, 0.1); color: var(--mumu); padding: 10px 20px; border-radius: 20px; font-size: 1rem; border: 1px solid var(--mumu); display: inline-block; margin-top: 15px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin: 25px 0; background: var(--card); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        th { background: #333; color: white; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #222; }
        .price-euro { color: var(--accent); font-weight: bold; }

        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 25px; flex-wrap: wrap; }
        .discord-btn { background: var(--discord); color: white; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .tele-btn { background: var(--tele); color: white; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .dl-btn { background: #444; color: white; padding: 15px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        
        .discord-btn:hover, .tele-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .info-card { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #222; text-align: left; }
        .footer { margin-top: 60px; color: #444; font-size: 0.8rem; border-top: 1px solid #222; padding-top: 20px; }
    </style>
</head>
